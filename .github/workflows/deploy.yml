name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/securebid

            # Pull the latest code
            git pull origin main

            # Backend: install deps, migrate, collect static
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt
            DJANGO_SETTINGS_MODULE=securebid.settings.production python manage.py migrate
            DJANGO_SETTINGS_MODULE=securebid.settings.production python manage.py collectstatic --noinput
            deactivate
            cd ..

            # Frontend: install deps and build
            cd frontend
            npm ci
            npm run build
            cd ..

            # Restart services
            sudo systemctl restart securebid
            sudo systemctl restart nginx
