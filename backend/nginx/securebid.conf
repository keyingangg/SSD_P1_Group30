# Nginx reverse proxy configuration for SecureBid.
# Terminates TLS, proxies API/admin/WebSocket traffic to the application
# server, and serves the React static build with SPA fallback.

# Redirect all HTTP traffic to HTTPS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # TODO: replace with real certificate paths (e.g. Let's Encrypt).
    ssl_certificate     /etc/ssl/certs/securebid.crt;
    ssl_certificate_key /etc/ssl/private/securebid.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Maximum upload size for auction images.
    client_max_body_size 10M;

    # React static build.
    root /var/www/securebid/frontend/dist;
    index index.html;

    # REST API and Django admin -> Gunicorn (WSGI).
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (live bid updates) -> Daphne (ASGI) with upgrade headers.
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for all other routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
